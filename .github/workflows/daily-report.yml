name: Daily Report Generation

on:
  schedule:
    - cron: '0 22 * * *'  # 매일 22:00 UTC = 07:00 KST
  workflow_dispatch:       # 수동 실행 허용

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate report
        run: npx tsx --tsconfig tsconfig.scripts.json scripts/generate-report.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/report.json /tmp/report_new.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/report_new.json data/report.json
          git add data/report.json
          git diff --staged --quiet || git commit -m "chore: daily report $(date -u +'%Y-%m-%d')"
          git push origin main
